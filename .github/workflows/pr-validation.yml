name: PR Validation
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt bandit ruff gitleaks
      - run: ruff check .
      - run: bandit -r .
      - run: gitleaks detect --source . -v
