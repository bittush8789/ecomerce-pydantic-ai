apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bittush8789/ecomerce-pydantic-ai.git
    targetRevision: HEAD
    path: devops/helm/ecommerce-ai
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecom-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
