apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-backend
  namespace: ecom-prod
spec:
  replicas: 3
  selector: { matchLabels: { app: ecom-backend } }
  template:
    metadata: { labels: { app: ecom-backend } }
    spec:
      containers:
      - name: ecom-backend
        image: ecomerce-pydantic-ai:latest
        resources:
          limits: { cpu: 500m, memory: 512Mi }
          requests: { cpu: 250m, memory: 256Mi }
        ports: [{ containerPort: 8000 }]
        livenessProbe: { httpGet: { path: /health, port: 8000 } }
        readinessProbe: { httpGet: { path: /health, port: 8000 } }
---
apiVersion: v1
kind: Service
metadata: { name: ecom-service, namespace: ecom-prod }
spec:
  selector: { app: ecom-backend }
  ports: [{ protocol: TCP, port: 80, targetPort: 8000 }]
  type: ClusterIP
