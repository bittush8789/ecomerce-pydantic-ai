apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: ecom-prod
  name: ecom-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecom-role-binding
  namespace: ecom-prod
subjects:
- kind: ServiceAccount
  name: ecom-sa
  namespace: ecom-prod
roleRef:
  kind: Role
  name: ecom-role
  apiGroup: rbac.authorization.k8s.io
